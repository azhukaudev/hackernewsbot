# Pre-approve build scripts for the packages C3 itself installs that need
# them: `workerd` downloads the platform binary, `esbuild` and `sharp`
# (via miniflare) download/build native bindings. Without these, pnpm 11+
# aborts the install with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  workerd: true
  sharp: true
minimumReleaseAgeExclude:
  - '@cloudflare/workerd-darwin-64@1.20260616.1'
  - '@cloudflare/workerd-darwin-arm64@1.20260616.1'
  - '@cloudflare/workerd-linux-64@1.20260616.1'
  - '@cloudflare/workerd-linux-arm64@1.20260616.1'
  - '@cloudflare/workerd-windows-64@1.20260616.1'
  - miniflare@4.20260616.0
  - workerd@1.20260616.1
  - wrangler@4.101.0
